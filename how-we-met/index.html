<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>How We Met — A Love Story in Pixels</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Floating pixel hearts -->
    <div class="hearts" aria-hidden="true">
      <span class="heart" style="--x: 8%; --delay: 0s; --dur: 14s;">♥</span>
      <span class="heart" style="--x: 22%; --delay: 3s; --dur: 18s;">♥</span>
      <span class="heart" style="--x: 45%; --delay: 7s; --dur: 16s;">♥</span>
      <span class="heart" style="--x: 68%; --delay: 2s; --dur: 20s;">♥</span>
      <span class="heart" style="--x: 85%; --delay: 5s; --dur: 15s;">♥</span>
      <span class="heart" style="--x: 35%; --delay: 10s; --dur: 17s;">♥</span>
      <span class="heart" style="--x: 55%; --delay: 1s; --dur: 19s;">♥</span>
      <span class="heart" style="--x: 92%; --delay: 8s; --dur: 13s;">♥</span>
    </div>

    <!-- Snow particles -->
    <div class="snow" aria-hidden="true">
      <span class="flake" style="--x: 5%; --delay: 0s; --dur: 8s;"></span>
      <span class="flake" style="--x: 15%; --delay: 1.5s; --dur: 10s;"></span>
      <span class="flake" style="--x: 25%; --delay: 3s; --dur: 7s;"></span>
      <span class="flake" style="--x: 38%; --delay: 0.5s; --dur: 9s;"></span>
      <span class="flake" style="--x: 50%; --delay: 4s; --dur: 11s;"></span>
      <span class="flake" style="--x: 62%; --delay: 2s; --dur: 8s;"></span>
      <span class="flake" style="--x: 75%; --delay: 5s; --dur: 10s;"></span>
      <span class="flake" style="--x: 88%; --delay: 1s; --dur: 9s;"></span>
      <span class="flake" style="--x: 95%; --delay: 3.5s; --dur: 7s;"></span>
      <span class="flake" style="--x: 42%; --delay: 6s; --dur: 12s;"></span>
    </div>

    <main class="page">
      <header class="intro">
        <p class="pretitle">Press Start</p>
        <h1 class="title">How We Met</h1>
        <p class="tagline">A love story in pixels</p>
        <p class="story-intro">
          Walk through the snow. Find each other. Throw a few snowballs along the way.
        </p>
      </header>

      <section class="frame">
        <div id="game" class="game"></div>
      </section>

      <section class="controls">
        <div class="control-group">
          <div class="control-item">
            <div class="keys">
              <kbd>←</kbd><kbd>→</kbd>
            </div>
            <span class="control-label">Move</span>
          </div>
          <div class="control-item">
            <div class="keys">
              <kbd>↑</kbd>
            </div>
            <span class="control-label">Jump</span>
          </div>
          <div class="control-item">
            <div class="keys">
              <kbd>Space</kbd>
            </div>
            <span class="control-label">Snowball</span>
          </div>
        </div>
        <p class="touch-hint">On mobile: tap left/right to move, swipe up to jump</p>
      </section>

      <footer class="footer">
        <p>Built with 🦉 by Alfred · A Barron &amp; Nina story</p>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
