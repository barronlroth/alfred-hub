<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Eye Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #1f1f1f;
    --text: #e8e4df;
    --text-dim: #6b6560;
    --text-muted: #3a3632;
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.15);
    --blue: #7ba7c9;
    --blue-dim: rgba(123,167,201,0.15);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
    z-index: 9999;
  }

  /* ─── Start Screen ─── */
  #start-screen {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    animation: fadeUp 1s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-family: var(--sans);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  #start-screen h1 {
    font-family: var(--serif);
    font-size: clamp(2.8rem, 8vw, 5.5rem);
    font-weight: 300;
    font-style: italic;
    line-height: 1.1;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #start-screen .desc {
    font-size: 0.95rem;
    color: var(--text-dim);
    line-height: 1.7;
    max-width: 360px;
    margin-bottom: 48px;
  }

  #name-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--serif);
    font-size: 1.3rem;
    font-style: italic;
    padding: 12px 0;
    width: 240px;
    text-align: center;
    outline: none;
    transition: border-color 0.3s;
    margin-bottom: 48px;
  }
  #name-input:focus { border-color: var(--text-dim); }
  #name-input::placeholder { color: var(--text-muted); font-style: italic; }

  .btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    padding: 16px 56px;
    font-family: var(--sans);
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--text);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: -1;
  }
  .btn:hover { color: var(--bg); border-color: var(--text); }
  .btn:hover::before { transform: scaleX(1); }

  /* ─── Game ─── */
  #game {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    padding: 0;
    animation: fadeUp 0.6s ease;
  }

  #game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
  }

  #round-label {
    font-family: var(--sans);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #progress-wrap {
    flex: 1;
    max-width: 200px;
    margin: 0 24px;
    height: 1px;
    background: var(--border);
    position: relative;
  }
  #progress-fill {
    height: 100%;
    background: var(--text-dim);
    transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0;
  }

  #score-label {
    font-family: var(--sans);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }

  /* Photos */
  #photos {
    flex: 1;
    display: flex;
    gap: 3px;
    padding: 0 3px 3px;
    min-height: 0;
    max-height: calc(100vh - 80px);
  }

  #tap-hint {
    text-align: center;
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 12px 0 0;
    transition: opacity 1s;
  }

  .photo-card {
    flex: 1;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .photo-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid transparent;
    transition: border-color 0.3s;
    pointer-events: none;
    z-index: 2;
  }

  .photo-card:hover::after { border-color: rgba(255,255,255,0.1); }

  .photo-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.5s ease, transform 6s ease;
    opacity: 0;
    min-height: 40vh;
    max-height: calc(100vh - 90px);
  }
  .photo-card img.loaded { opacity: 1; }
  .photo-card:hover img { transform: scale(1.02); }

  .photo-card .spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    z-index: 1;
    transition: opacity 0.4s;
  }
  .photo-card .spinner.hidden { opacity: 0; pointer-events: none; }
  .photo-card .spinner::after {
    content: '';
    width: 24px;
    height: 24px;
    border: 1px solid var(--border);
    border-top-color: var(--text-dim);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Selection states */
  .photo-card.chosen::after { border-color: var(--text) !important; }
  .photo-card.not-chosen { opacity: 0.2; transform: scale(0.98); }
  .photo-card.not-chosen img { filter: grayscale(0.5); }

  /* Side labels on hover */
  .photo-card .side-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.6);
    padding: 6px 16px;
    backdrop-filter: blur(8px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 3;
  }
  .photo-card:hover .side-hint { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── Results ─── */
  #results {
    display: none;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 60px;
    animation: fadeUp 0.8s ease;
  }

  #results .eyebrow { margin-bottom: 16px; }

  #results h2 {
    font-family: var(--serif);
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 300;
    font-style: italic;
    margin-bottom: 8px;
  }

  #results-name {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 60px;
  }

  /* Result bars */
  .result-section { width: 100%; max-width: 520px; margin-bottom: 48px; }

  .result-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .result-label {
    width: 110px;
    text-align: right;
    font-family: var(--serif);
    font-size: 1rem;
    font-style: italic;
    color: var(--text-dim);
  }

  .result-bar {
    flex: 1;
    height: 36px;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .result-bar .fill {
    height: 100%;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0;
  }
  .fill-a { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .fill-b { background: linear-gradient(90deg, var(--blue-dim), var(--blue)); }

  .result-pct {
    width: 70px;
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--text);
  }

  /* Reveal */
  .reveal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px 40px;
    margin-bottom: 32px;
    text-align: center;
    max-width: 420px;
  }

  .reveal-card h3 {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .reveal-card p {
    font-family: var(--serif);
    font-size: 1.15rem;
    margin: 8px 0;
    font-style: italic;
  }

  .reveal-card .name-a { color: var(--gold); }
  .reveal-card .name-b { color: var(--blue); }
  .reveal-card .eq { color: var(--text-muted); margin: 0 4px; }

  .winner-msg {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-style: italic;
    margin: 20px 0 48px;
    color: var(--text);
  }

  /* Picked grid */
  #picked-heading {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  #picked-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 3px;
    width: 100%;
    max-width: 900px;
    margin-bottom: 48px;
  }

  #picked-grid .pick {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1;
  }

  #picked-grid .pick img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #picked-grid .pick .tag {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 5px;
    font-family: var(--sans);
    font-size: 0.6rem;
    text-align: center;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .tag-a { background: rgba(201,169,110,0.85); color: var(--bg); }
  .tag-b { background: rgba(123,167,201,0.85); color: var(--bg); }

  /* Past results */
  #past-results {
    width: 100%;
    max-width: 520px;
    margin-top: 32px;
    margin-bottom: 48px;
  }

  #past-results h3 {
    font-family: var(--sans);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .past-entry {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  /* Mobile */
  @media (max-width: 640px) {
    #photos { flex-direction: column; gap: 2px; padding: 0 2px 2px; }
    .photo-card img { min-height: 35vh; max-height: 42vh; }
    #game-header { padding: 16px 20px; }
    .reveal-card { padding: 24px 20px; }
    #picked-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  }
</style>
</head>
<body>

<div id="start-screen">
  <div class="eyebrow">A blind comparison</div>
  <h1>The Eye Test</h1>
  <p>Two photographers. Twenty-five rounds. You pick what moves you. Names revealed at the end.</p>
  <input type="text" id="name-input" placeholder="Your name" autofocus>
  <button class="btn" onclick="startGame()">Begin</button>
</div>

<div id="game">
  <div id="game-header">
    <div id="round-label"></div>
    <div id="progress-wrap"><div id="progress-fill"></div></div>
    <div id="score-label"></div>
  </div>
  <div id="tap-hint">Tap the photo you prefer</div>
  <div id="photos">
    <div class="photo-card" id="card-left" onclick="pick('left')">
      <div class="spinner" id="spin-left"></div>
      <img id="img-left" src="" alt="">
      <div class="side-hint">Choose</div>
    </div>
    <div class="photo-card" id="card-right" onclick="pick('right')">
      <div class="spinner" id="spin-right"></div>
      <img id="img-right" src="" alt="">
      <div class="side-hint">Choose</div>
    </div>
  </div>
</div>

<div id="results">
  <div class="eyebrow">Your picks are in</div>
  <h2 id="results-heading">The Verdict</h2>
  <div id="results-name"></div>
  <div class="result-section">
    <div class="result-row">
      <div class="result-label">One</div>
      <div class="result-bar"><div class="fill fill-a" id="bar-a"></div></div>
      <div class="result-pct" id="pct-a"></div>
    </div>
    <div class="result-row">
      <div class="result-label">Two</div>
      <div class="result-bar"><div class="fill fill-b" id="bar-b"></div></div>
      <div class="result-pct" id="pct-b"></div>
    </div>
  </div>
  <div class="reveal-card">
    <h3>The Reveal</h3>
    <p><span class="name-a">Photographer One</span><span class="eq">=</span> Aileen Ayala</p>
    <p><span class="name-b">Photographer Two</span><span class="eq">=</span> Gillian Verni</p>
  </div>
  <div class="winner-msg" id="winner-msg"></div>
  <div id="picked-heading">Your choices</div>
  <div id="picked-grid"></div>
  <div id="past-results"></div>
  <button class="btn" onclick="reset()">Play Again</button>
  <br><br>
</div>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let rounds=[],current=0,votes={a:0,b:0},choices=[],playerName='',locked=false;

function buildRounds(){
  const count=Math.min(A.length,B.length,30);
  const sa=shuffle([...A]).slice(0,count), sb=shuffle([...B]).slice(0,count);
  rounds=[];
  for(let i=0;i<count;i++){
    const aLeft=Math.random()<0.5;
    rounds.push({
      left:{url:aLeft?sa[i]:sb[i],who:aLeft?'a':'b'},
      right:{url:aLeft?sb[i]:sa[i],who:aLeft?'b':'a'}
    });
  }
  shuffle(rounds);
}

function startGame(){
  playerName=document.getElementById('name-input').value.trim()||'Anonymous';
  buildRounds(); current=0; votes={a:0,b:0}; choices=[];
  document.getElementById('start-screen').style.display='none';
  document.getElementById('results').style.display='none';
  const g=document.getElementById('game');
  g.style.display='flex';
  showRound();
}

function showRound(){
  locked=false;
  const r=rounds[current];
  document.getElementById('progress-fill').style.width=((current)/rounds.length*100)+'%';
  document.getElementById('round-label').textContent='Round '+(current+1)+' / '+rounds.length;
  document.getElementById('score-label').textContent='';

  const imgL=document.getElementById('img-left'), imgR=document.getElementById('img-right');
  const spinL=document.getElementById('spin-left'), spinR=document.getElementById('spin-right');
  const cardL=document.getElementById('card-left'), cardR=document.getElementById('card-right');

  cardL.className='photo-card'; cardR.className='photo-card';
  spinL.className='spinner'; spinR.className='spinner';
  imgL.className=''; imgR.className='';

  imgL.onload=()=>{spinL.classList.add('hidden');imgL.classList.add('loaded')};
  imgR.onload=()=>{spinR.classList.add('hidden');imgR.classList.add('loaded')};
  imgL.src=r.left.url;
  imgR.src=r.right.url;

  // Preload next
  if(current+1<rounds.length){
    new Image().src=rounds[current+1].left.url;
    new Image().src=rounds[current+1].right.url;
  }
}

function pick(side){
  if(locked)return;
  locked=true;
  const r=rounds[current];
  const chosen=side==='left'?r.left:r.right;
  votes[chosen.who]++;
  choices.push({url:chosen.url,who:chosen.who});

  const cardL=document.getElementById('card-left'), cardR=document.getElementById('card-right');
  const hint=document.getElementById('tap-hint');if(hint)hint.style.opacity='0';
  if(side==='left'){cardL.classList.add('chosen');cardR.classList.add('not-chosen')}
  else{cardR.classList.add('chosen');cardL.classList.add('not-chosen')}

  setTimeout(()=>{current++;current>=rounds.length?showResults():showRound()},700);
}

function showResults(){
  document.getElementById('game').style.display='none';
  const r=document.getElementById('results');
  r.style.display='flex';
  document.getElementById('results-name').textContent=playerName;

  const total=votes.a+votes.b;
  const pA=Math.round((votes.a/total)*100), pB=100-pA;

  setTimeout(()=>{
    document.getElementById('bar-a').style.width=pA+'%';
    document.getElementById('bar-b').style.width=pB+'%';
  },200);
  document.getElementById('pct-a').textContent=votes.a+' ('+pA+'%)';
  document.getElementById('pct-b').textContent=votes.b+' ('+pB+'%)';

  const msg=document.getElementById('winner-msg');
  if(pA>=75) msg.textContent='Clear preference for Aileen Ayala';
  else if(pB>=75) msg.textContent='Clear preference for Gillian Verni';
  else msg.textContent='No clear winner — too close to call';

  const grid=document.getElementById('picked-grid');
  grid.innerHTML='';
  choices.forEach(c=>{
    const d=document.createElement('div');d.className='pick';
    d.innerHTML='<img src="'+c.url+'" alt=""><div class="tag '+(c.who==='a'?'tag-a':'tag-b')+'">'+(c.who==='a'?'Aileen Ayala':'Gillian Verni')+'</div>';
    grid.appendChild(d);
  });

  const entry={name:playerName,date:new Date().toISOString(),votesA:votes.a,votesB:votes.b,pctA:pA,pctB:pB};
  const history=JSON.parse(localStorage.getItem('photo-compare-results')||'[]');
  history.push(entry);
  localStorage.setItem('photo-compare-results',JSON.stringify(history));

  const pastDiv=document.getElementById('past-results');
  pastDiv.innerHTML='';
  if(history.length>1){
    pastDiv.innerHTML='<h3>Previous Sessions</h3>';
    history.slice().reverse().forEach(h=>{
      const d=new Date(h.date).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
      pastDiv.innerHTML+='<div class="past-entry"><span>'+h.name+' — '+d+'</span><span style="color:var(--gold)">'+h.pctA+'%</span> / <span style="color:var(--blue)">'+h.pctB+'%</span></div>';
    });
  }
}

function reset(){
  document.getElementById('results').style.display='none';
  const s=document.getElementById('start-screen');
  s.style.display='flex';
  document.getElementById('name-input').value='';
  document.getElementById('name-input').focus();
}

document.getElementById('start-screen').style.display='flex';
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startGame()});
</script>
